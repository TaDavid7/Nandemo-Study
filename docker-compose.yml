services:
  backend:
    build: ./backend
    container_name: flashcards-backend
    ports:
      - "127.0.0.1:4000:4000"
    env_file:
      - .env
    restart: unless-stopped
    networks: [appnet]
    depends_on:
      - ollama 

  frontend:
    build:
      context: ./mem-study-next
      args:
        NEXT_PUBLIC_SOCKET_URL: "/api"
    container_name: mem-study-frontend
    ports:
      - "127.0.0.1:3000:3000"
    depends_on: [backend]
    restart: unless-stopped
    networks: [appnet]

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"          # host → container
    volumes:
      - ollama-data:/root/.ollama
    restart: unless-stopped
    networks: [appnet]

networks:
  appnet:
    driver: bridge

volumes:
  ollama-data:
